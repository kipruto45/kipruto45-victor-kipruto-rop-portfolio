version: '3.8'

services:
  postgres-equity:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-equity_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-equity_password}
      POSTGRES_DB: ${DB_NAME:-equity_warehouse}
    ports:
      - "5441:5432"
    volumes:
      - postgres_equity_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  airflow-equity:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-equity_admin}:${DB_PASSWORD:-equity_password}@postgres-equity:5432/${DB_NAME:-equity_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/equity
    ports:
      - "8082:8080"
    depends_on:
      - postgres-equity

  equity-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8502 --server.address 0.0.0.0"
    ports:
      - "8502:8502"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-equity
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-equity

volumes:
  postgres_equity_data:
