version: '3.8'

services:
  postgres-forecast:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-mpesa_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mpesa_password}
      POSTGRES_DB: ${DB_NAME:-forecast_warehouse}
    ports:
      - "5444:5432"

  forecast-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary scikit-learn && streamlit run dashboards/forecast_dashboard.py --server.port 8513 --server.address 0.0.0.0"
    ports:
      - "8513:8513"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-forecast
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-forecast
