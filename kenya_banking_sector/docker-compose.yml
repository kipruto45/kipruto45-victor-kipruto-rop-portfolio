version: '3.8'

services:
  postgres-sector:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-sector_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sector_password}
      POSTGRES_DB: ${DB_NAME:-sector_warehouse}
    ports:
      - "5437:5432"
    volumes:
      - postgres_sector_data:/var/lib/postgresql/data

  airflow-sector:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-sector_admin}:${DB_PASSWORD:-sector_password}@postgres-sector:5432/${DB_NAME:-sector_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/sector
    ports:
      - "8086:8080"
    depends_on:
      - postgres-sector

  sector-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8504 --server.address 0.0.0.0"
    ports:
      - "8504:8504"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-sector
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-sector

volumes:
  postgres_sector_data:
