version: '3.8'

services:
  postgres-agents:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-mpesa_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mpesa_password}
      POSTGRES_DB: ${DB_NAME:-agent_warehouse}
    ports:
      - "5443:5432"

  agent-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboards/agent_dashboard.py --server.port 8512 --server.address 0.0.0.0"
    ports:
      - "8512:8512"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-agents
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-agents
