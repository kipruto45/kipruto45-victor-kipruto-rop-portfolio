version: '3.8'

services:
  postgres-safaricom:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-saf_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saf_password}
      POSTGRES_DB: ${DB_NAME:-safaricom_warehouse}
    ports:
      - "5439:5432"
    volumes:
      - postgres_saf_data:/var/lib/postgresql/data

  airflow-safaricom:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-saf_admin}:${DB_PASSWORD:-saf_password}@postgres-safaricom:5432/${DB_NAME:-safaricom_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/safaricom
    ports:
      - "8085:8080"
    depends_on:
      - postgres-safaricom

  safaricom-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8513 --server.address 0.0.0.0"
    ports:
      - "8513:8513"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-safaricom
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-safaricom

volumes:
  postgres_saf_data:
