version: '3.8'

services:
  postgres-merchants:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-mpesa_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mpesa_password}
      POSTGRES_DB: ${DB_NAME:-merchant_warehouse}
    ports:
      - "5446:5432"

  merchant-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboards/merchant_dashboard.py --server.port 8515 --server.address 0.0.0.0"
    ports:
      - "8515:8515"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-merchants
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-merchants
