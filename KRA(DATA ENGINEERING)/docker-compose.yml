services:
  postgres-kra:
    image: postgres:15
    environment:
      POSTGRES_USER: kra_admin
      POSTGRES_PASSWORD: kra_password
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_kra_data:/var/lib/postgresql/data
      - ./Tax_Revenue_Analytics/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  airflow-kra:
    image: apache/airflow:2.7.1
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://kra_admin:kra_password@postgres-kra/postgres
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./Tax_Revenue_Analytics/dags:/opt/airflow/dags
      - .:/opt/airflow/projects/kra
    depends_on:
      - postgres-kra
    ports:
      - "8085:8080"

  revenue-dashboard:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly sqlalchemy psycopg2-binary pandas && streamlit run /opt/airflow/projects/kra/Tax_Revenue_Analytics/dashboard_app.py --server.port 8506 --server.address 0.0.0.0"
    ports:
      - "8506:8506"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/opt/airflow/projects/kra

  customs-dashboard:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly pandas && streamlit run /opt/airflow/projects/kra/Customs_Trade_Pipeline/dashboard_app.py --server.port 8507 --server.address 0.0.0.0"
    ports:
      - "8507:8507"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/opt/airflow/projects/kra

  vat-dashboard:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly pandas && streamlit run /opt/airflow/projects/kra/VAT_Compliance_Gap_Analysis/dashboard_app.py --server.port 8508 --server.address 0.0.0.0"
    ports:
      - "8508:8508"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/opt/airflow/projects/kra

  itax-dashboard:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly pandas && streamlit run /opt/airflow/projects/kra/iTax_Registration_Analytics/dashboard_app.py --server.port 8509 --server.address 0.0.0.0"
    ports:
      - "8509:8509"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/opt/airflow/projects/kra

volumes:
  postgres_kra_data:
