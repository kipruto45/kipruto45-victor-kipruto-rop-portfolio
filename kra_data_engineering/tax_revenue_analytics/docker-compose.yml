services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: kra_admin
      POSTGRES_PASSWORD: kra_password
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_kra_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  airflow:
    image: apache/airflow:2.7.1
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://kra_admin:kra_password@postgres/postgres
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_DEPENDENCIES=dbt-postgres pandas plotly sqlalchemy psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/projects/kra_revenue
    depends_on:
      - postgres
    ports:
      - "8085:8080"

  dashboard:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly sqlalchemy psycopg2-binary pandas && streamlit run /opt/airflow/projects/kra_revenue/dashboard_app.py --server.port 8506 --server.address 0.0.0.0"
    ports:
      - "8506:8506"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/opt/airflow/projects
    depends_on:
      - postgres

volumes:
  postgres_kra_data:
