# AML Transaction Monitoring Rules Configuration
# Kenya Banking Sector - Anti-Money Laundering Compliance
# Last Updated: 2024-01-01

rules:
  # STRUCTURING RULES
  structuring:
    enabled: true
    description: "Detect structured deposits just below reporting threshold"
    reporting_threshold_kes: 1_000_000
    threshold_proximity_percent: 95
    min_transactions: 3
    time_window_days: 7
    risk_score_multiplier: 0.8
    alert_severity: "high"
  
  # VELOCITY CHECKS
  velocity:
    enabled: true
    description: "Detect unusually high transaction frequency"
    high_velocity_threshold: 5
    time_window_minutes: 30
    risk_score_multiplier: 0.6
    alert_severity: "medium"
  
  # CASH SPIKE DETECTION
  cash_spike:
    enabled: true
    description: "Detect sudden spikes in transaction amounts"
    baseline_period_days: 90
    deviation_threshold_stddev: 3.0
    min_spike_amount_kes: 500_000
    risk_score_multiplier: 0.7
    alert_severity: "high"
  
  # SIM SWAP FRAUD
  sim_swap:
    enabled: true
    description: "Detect potential SIM swap fraud indicators"
    rapid_location_change_km: 100
    time_window_hours: 2
    high_value_threshold_kes: 100_000
    risk_score_multiplier: 0.9
    alert_severity: "critical"
  
  # RAPID CYCLES (LAYERING)
  rapid_cycles:
    enabled: true
    description: "Detect rapid deposit-withdrawal patterns (layering)"
    min_cycle_pairs: 2
    time_window_hours: 24
    cycle_time_tolerance_hours: 1
    risk_score_multiplier: 0.75
    alert_severity: "high"
  
  # PEP MATCHING
  pep_matching:
    enabled: true
    description: "Match transactions against PEP/sanctions lists"
    pep_list_sources:
      - "fatf_world_bank"
      - "un_sanctions"
      - "us_treasury"
      - "cbk_blacklist"
    exact_match_risk_score: 95
    fuzzy_match_threshold: 0.85
    fuzzy_match_risk_score: 70
    alert_severity: "critical"
  
  # BENEFICIARY MONITORING
  beneficiary:
    enabled: true
    description: "Monitor beneficiary patterns"
    new_beneficiary_threshold_transactions: 1
    rapid_beneficiary_addition_count: 5
    time_window_days: 7
    risk_score_multiplier: 0.4
    alert_severity: "low"
  
  # DORMANT ACCOUNT ACTIVATION
  dormant_activation:
    enabled: true
    description: "Monitor activation of dormant accounts"
    dormant_threshold_days: 180
    high_value_first_txn_kes: 1_000_000
    risk_score_multiplier: 0.5
    alert_severity: "medium"

# THRESHOLDS AND LIMITS
thresholds:
  # Reporting thresholds
  cash_report_threshold_kes: 1_000_000
  suspicious_activity_threshold_kes: 500_000
  
  # Risk score thresholds
  critical_risk_score: 80
  high_risk_score: 60
  medium_risk_score: 40
  low_risk_score: 20
  
  # Transaction limits
  daily_transaction_limit_kes: 10_000_000
  monthly_transaction_limit_kes: 50_000_000
  new_customer_daily_limit_kes: 1_000_000
  
  # Velocity limits
  max_transactions_per_hour: 20
  max_transactions_per_day: 100

# ENTITY TYPES AND RISK PROFILES
entity_types:
  high_risk:
    - "money_exchange"
    - "informal_financial_services"
    - "gambling"
    - "precious_metals_dealer"
    
  medium_risk:
    - "retail_business"
    - "import_export"
    - "real_estate"
    - "hospitality"
    
  low_risk:
    - "government_agency"
    - "licensed_bank"
    - "insurance_company"
    - "pension_fund"

# GEOGRAPHIC RISK PROFILES
high_risk_jurisdictions:
  - "North Korea"
  - "Iran"
  - "Syria"
  - "Cuba"

# SECTOR MONITORING
sectors:
  telecommunications:
    # M-Pesa agents
    monitoring_level: "standard"
    transaction_limit_kes: 5_000_000
    alert_thresholds:
      daily_transactions: 50
      hourly_transactions: 10
  
  hospitality:
    monitoring_level: "enhanced"
    transaction_limit_kes: 2_000_000
    alert_thresholds:
      daily_transactions: 30
      hourly_transactions: 5
  
  import_export:
    monitoring_level: "enhanced"
    transaction_limit_kes: 10_000_000
    alert_thresholds:
      daily_transactions: 20
      hourly_transactions: 3

# ALERT HANDLING
alert_handling:
  # Auto-escalation rules
  auto_escalate_critical: true
  auto_escalate_high_if_repeat: true
  repeat_threshold_days: 7
  
  # Investigation requirements
  critical_alert_investigation_hours: 4
  high_alert_investigation_hours: 24
  medium_alert_investigation_hours: 72
  
  # Notification settings
  send_email_alerts: true
  alert_recipients:
    - "compliance@bank.co.ke"
    - "aml@cbk.go.ke"
  
  # Case management
  create_case_for_escalated_alerts: true
  assign_to_aml_officer: true
  sla_hours: 24

# REPORTING CONFIGURATION
reporting:
  # STR (Suspicious Transaction Report) generation
  auto_generate_str: true
  str_submission_deadline_days: 30
  
  # Sanctions list updates
  pep_list_refresh_frequency_hours: 24
  un_sanctions_refresh_frequency_hours: 12
  
  # Compliance reporting
  monthly_aml_report: true
  quarterly_risk_assessment: true
  annual_aml_audit: true

# PERFORMANCE TUNING
performance:
  # Batch processing
  batch_size: 1000
  processing_timeout_seconds: 300
  
  # Caching
  cache_pep_lists: true
  cache_ttl_hours: 24
  
  # Parallel processing
  worker_threads: 4
  max_queue_size: 10000
