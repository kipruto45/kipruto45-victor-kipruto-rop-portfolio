version: '3.8'

services:
  postgres-kra:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-kra_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kra_password}
      POSTGRES_DB: ${DB_NAME:-kra_warehouse}
    ports:
      - "5438:5432"
    volumes:
      - postgres_kra_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-point-initdb.d/init-db.sh

  airflow-kra:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-kra_admin}:${DB_PASSWORD:-kra_password}@postgres-kra:5432/${DB_NAME:-kra_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/kra
    ports:
      - "8084:8080"
    depends_on:
      - postgres-kra

  kra-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8506 --server.address 0.0.0.0"
    ports:
      - "8506:8506"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-kra
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-kra

volumes:
  postgres_kra_data:
