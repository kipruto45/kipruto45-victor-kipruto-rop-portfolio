# This file is provided for standalone execution of this sub-project.
# Use the root KRA/docker-compose.yml for integrated execution.
services:
  postgres-customs:
    image: postgres:15
    environment:
      POSTGRES_USER: kra_admin
      POSTGRES_PASSWORD: kra_password
      POSTGRES_DB: kra_warehouse
    ports:
      - "5438:5432"

  dashboard-customs:
    image: apache/airflow:2.7.1
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run /opt/airflow/projects/dashboard_app.py --server.port 8507 --server.address 0.0.0.0"
    ports:
      - "8507:8507"
    volumes:
      - .:/opt/airflow/projects
